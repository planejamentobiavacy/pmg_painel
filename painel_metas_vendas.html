<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Avacy – Metas de Vendas TV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:#f0f2f5}
body{font-family:'Barlow',sans-serif;color:#1a1a2e}

/* ── HEADER ── */
.header{
  height:80px;
  background:linear-gradient(135deg,#1a2fa8 0%,#0d1b6e 100%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;
  box-shadow:0 3px 16px rgba(0,0,0,.5);
  flex-shrink:0;
}
.header-title h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:40px;font-weight:900;letter-spacing:4px;color:#fff;line-height:1;
  text-transform:uppercase;
}
.header-title p{
  font-size:16px;letter-spacing:4px;color:rgba(255,255,255,.55);
  text-transform:uppercase;margin-top:3px;
}
.header-right{display:flex;align-items:center;gap:32px}
.dados-ate{text-align:right}
.dados-ate .lbl{font-size:15px;color:rgba(255,255,255,.6);letter-spacing:1px;text-transform:uppercase}
.dados-ate .val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:#7ecfff;letter-spacing:1px}
.cache-badge{font-size:14px;color:rgba(255,255,255,.35);margin-top:2px}

/* ── MAIN ── */
.main{
  height:1000px; /* 1080 - 80 header */
  padding:16px 20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

/* ── CHANNEL CARD ── */
.ch-section{
  display:flex;flex-direction:column;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  border:1px solid #e0e4ea;
}

/* Channel header */
.ch-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;
  flex-shrink:0;
}
.ch-head .ch-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:34px;font-weight:900;letter-spacing:4px;color:#fff;text-transform:uppercase;
}
.ch-head .ch-pct{
  font-family:'Barlow Condensed',sans-serif;
  font-size:38px;font-weight:900;color:#fff;
}
.hd-FARMER{background:linear-gradient(135deg,#1a6fb8,#1255a0)}
.hd-DEVELOPER{background:linear-gradient(135deg,#c97b2e,#a86020)}
.hd-CLOSER{background:linear-gradient(135deg,#b5302a,#8b2020)}

/* Gauge area */
.ch-gauge-area{
  display:flex;align-items:center;justify-content:center;
  padding:8px 20px 4px;
  border-bottom:1px solid #eee;
  flex-shrink:0;
}
.gauge-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.gauge-sublabel{font-size:13px;color:#999;text-transform:uppercase;letter-spacing:2px}

/* Table header */
.ch-table-title{
  padding:10px 22px 6px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:#888;
  flex-shrink:0;
}

/* Table */
.ch-table-wrap{flex:1;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:8px 14px;color:#888;
  border-bottom:2px solid #e0e0e0;
  white-space:nowrap;
}
.th-center{text-align:center}
tbody tr{border-bottom:1px solid #f0f0f0}
tbody tr:nth-child(even){background:#fafbfc}
tbody td{padding:8px 14px;font-size:20px;vertical-align:middle;color:#1a1a2e}
.td-nome{
  font-weight:600;max-width:220px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:#1a1a2e;
}
.td-pct{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:800;
  border-radius:5px;padding:3px 10px;
  display:inline-block;white-space:nowrap;
}
.pct-g{background:#e8f5e9;color:#2e7d32}
.pct-w{background:#fff8e1;color:#e65100}
.pct-b{background:#ffebee;color:#c62828}
.pct-none{background:transparent;color:#bbb}
.tot-row td{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:900;
  background:#f5f5f5;
  border-top:2px solid #ddd;
  color:#1a1a2e;
}

/* Posit bar */
.posit-bar-wrap{display:flex;align-items:center;justify-content:center;gap:8px}
.posit-bar-bg{width:80px;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden}
.posit-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.posit-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;min-width:24px;text-align:right;color:#444}

/* Loading */
#loading{
  position:fixed;inset:0;background:#f0f2f5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;
}
.spinner{width:56px;height:56px;border:5px solid #e0e0e0;border-top-color:#1a2fa8;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:#888;font-size:20px;letter-spacing:2px}
#err-box{display:none;position:fixed;bottom:20px;left:20px;right:20px;background:rgba(198,40,40,.9);border-radius:10px;padding:16px 24px;color:#fff;font-size:18px;z-index:998}

/* Updating banner */
#updating-banner{
  display:none;position:fixed;
  top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:998;background:rgba(26,47,168,.95);color:#fff;
  text-align:center;padding:24px 60px;border-radius:16px;
  font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:3px;
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  animation:pulse 1.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}

/* Scrolling table animation for long lists */
.ch-table-wrap{position:relative;overflow:hidden}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p id="loadMsg">CARREGANDO…</p></div>
<div id="err-box"></div>
<div id="updating-banner">🔄 EM ATUALIZAÇÃO…</div>

<div id="app" style="display:none">
  <div class="header">
    <div class="header-title">
      <h1>AVACY · METAS DE VENDAS</h1>
      <p>Consolidado de Vendedores — Mês Atual</p>
    </div>
    <div class="header-right">
      <div class="dados-ate">
        <div class="lbl">Dados até</div>
        <div class="val" id="dataUltVenda">—</div>
        <div class="cache-badge" id="cacheInfo"></div>
      </div>
    </div>
  </div>

  <div class="main" id="channelsGrid"></div>
</div>

<script>
var APPS_URL = 'https://script.google.com/macros/s/AKfycbzPtcFKRGVIWHurmjMdGrthLLKMcDQuq5HVJxQm_fO9pinzgqXCUXsVKTbznAfPFv0C/exec';

var CH_TOP = { FARMER:10, DEVELOPER:999, CLOSER:3 };
var CHANNELS = [
  { id:'FARMER',    label:'FARMER',    color:'#1a6fb8' },
  { id:'DEVELOPER', label:'DEVELOPER', color:'#c97b2e' },
  { id:'CLOSER',    label:'CLOSER',    color:'#b5302a' },
];

function nn(s){ return String(s||'').toUpperCase().trim().replace(/\s+/g,' '); }

// Build channel cards
var grid = document.getElementById('channelsGrid');
CHANNELS.forEach(function(ch){
  grid.insertAdjacentHTML('beforeend',
    '<div class="ch-section">'+
      '<div class="ch-head hd-'+ch.id+'">'+
        '<span class="ch-title">'+ch.label+'</span>'+
        '<span class="ch-pct" id="hpct_'+ch.id+'">—</span>'+
      '</div>'+
      '<div class="ch-gauge-area">'+
        '<div class="gauge-wrap">'+
          '<div class="gauge-sublabel">%ATING FAT MTD</div>'+
          '<canvas id="g_'+ch.id+'" width="340" height="190"></canvas>'+
        '</div>'+
      '</div>'+
      '<div class="ch-table-title">Vendedores '+ch.label+'</div>'+
      '<div class="ch-table-wrap">'+
        '<table>'+
          '<thead><tr>'+
            '<th>Nome Vendedor</th>'+
            '<th class="th-center">%Ating Fat MTD</th>'+
            '<th class="th-center">Posit MTD</th>'+
            '<th class="th-center">Posit Dia</th>'+
          '</tr></thead>'+
          '<tbody id="tb_'+ch.id+'"></tbody>'+
        '</table>'+
      '</div>'+
    '</div>');
});

// ── FETCH ────────────────────────────────────────────────────────────────
function apiFetch(params){
  var url = APPS_URL+'?'+Object.keys(params).map(function(k){
    return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  }).join('&');
  return fetch(url,{redirect:'follow'}).then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  });
}

// ── LOCAL CACHE ──────────────────────────────────────────────────────────
var LC_KEY='avacy_tv_cache', LC_TTL=10*60*1000;
function lcSave(d){try{localStorage.setItem(LC_KEY,JSON.stringify({ts:Date.now(),data:d}));}catch(e){}}
function lcLoad(){
  try{
    var s=localStorage.getItem(LC_KEY); if(!s) return null;
    var o=JSON.parse(s);
    if(Date.now()-o.ts>LC_TTL) return null;
    return o.data;
  }catch(e){return null;}
}

// ── LOAD ─────────────────────────────────────────────────────────────────
function showBanner(v){var b=document.getElementById('updating-banner');if(b)b.style.display=v?'block':'none';}
var _lastBuiltAt='';

function processResults(results){
  var vendasRows    = results[0].rows||[];
  var vendMap       = buildVendMap(results[1].rows||[]);
  var abasExport    = results[2].vendedores||{};
  var metaOutrosRows= results[3].rows||[];
  var cacheEl = document.getElementById('cacheInfo');
  if(cacheEl) cacheEl.textContent = results[2]._fromCache ? '📦 cache' : '🔄 ao vivo';
  if(results[2]._builtAt) _lastBuiltAt = results[2]._builtAt;
  var metaPorVend = calcMetaPorVend(vendMap,abasExport,metaOutrosRows);
  lcSave({vendasRows:vendasRows,vendMap:vendMap,metaPorVend:metaPorVend,builtAt:results[2]._builtAt||''});
  render(vendasRows,vendMap,metaPorVend);
}

function loadData(isSilent){
  if(isSilent){ showBanner(true); } else { setLoading(true,'CARREGANDO…'); }
  clearErr();
  return Promise.all([
    apiFetch({action:'vendas_v1'}),
    apiFetch({sheet:'VEND_CANAL'}),
    apiFetch({action:'exportCached'}),
    apiFetch({sheet:'META_OUTROS'})
  ])
  .then(function(results){
    processResults(results);
    setLoading(false); showBanner(false);
  })
  .catch(function(e){
    console.error(e); showErr('❌ '+e.message);
    document.getElementById('app').style.display='';
    setLoading(false); showBanner(false);
  });
}

function checkAndRefresh(){
  apiFetch({action:'exportFresh'})
  .then(function(res){
    var b=String(res._builtAt||'').trim();
    if(!b) return;
    if(_lastBuiltAt===''){ _lastBuiltAt=b; return; }
    if(b!==_lastBuiltAt){ _lastBuiltAt=b; loadData(true); }
  })
  .catch(function(){});
}

function startApp(){
  var cached=lcLoad();
  if(cached){
    try{
      render(cached.vendasRows,cached.vendMap,cached.metaPorVend);
      if(cached.builtAt) _lastBuiltAt=cached.builtAt;
      document.getElementById('app').style.display='';
      setLoading(false);
      loadData(true).then(function(){ setInterval(checkAndRefresh,60*1000); })
                    .catch(function(){ setInterval(checkAndRefresh,60*1000); });
      return;
    }catch(e){}
  }
  loadData().then(function(){ setInterval(checkAndRefresh,60*1000); })
            .catch(function(){ setInterval(checkAndRefresh,60*1000); });
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',startApp);
} else { startApp(); }

// ── VEND MAP ─────────────────────────────────────────────────────────────
function buildVendMap(rows){
  var m={};
  rows.forEach(function(r){
    var nome=nn(r['NOME_VENDEDOR']||r['VENDEDOR']||r['NOME']||'');
    var canal=nn(r['CANAL']||r['canal']||'');
    var aba=String(r['ABA']||r['aba']||'').trim();
    if(nome&&canal) m[nome]={canal:canal,aba:aba};
  });
  return m;
}

// ── META ─────────────────────────────────────────────────────────────────
function parseDt(raw){
  var s=String(raw||'').trim();
  var m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})/);
  if(m) return m[3]+'-'+m[2]+'-'+m[1];
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.substring(0,10);
  return s;
}
function maxDt(rows){
  var max='';
  rows.forEach(function(r){var d=parseDt(r['DATA ENVIO']||'');if(d>max)max=d;});
  return max;
}
function calcMetaPorVend(vendMap,abasExport,metaOutrosRows){
  var result={};
  var maxOutros=maxDt(metaOutrosRows);
  Object.keys(vendMap).forEach(function(nome){
    var info=vendMap[nome];
    if(info.canal==='CLOSER'){
      var linhas=metaOutrosRows.filter(function(r){
        if(parseDt(r['DATA ENVIO']||'')!==maxOutros) return false;
        var nRow=nn(r['NOME_VENDEDOR']||r['VENDEDOR']||r['NOME']||'');
        return !nRow||nRow===nome;
      });
      result[nome]=linhas.reduce(function(s,r){return s+toNum(r['META FAT']||r['META FAT.']||r['META']||'0');},0);
    } else {
      var rows=abasExport[info.aba]||[];
      if(!rows.length){result[nome]=0;return;}
      var maxD=maxDt(rows);
      result[nome]=rows.filter(function(r){return parseDt(r['DATA ENVIO']||'')===maxD;})
        .reduce(function(s,r){return s+toNum(r['META FAT.']||r['META FAT']||'0');},0);
    }
  });
  var cVends=Object.keys(vendMap).filter(function(n){return vendMap[n].canal==='CLOSER';});
  var totalAtrib=cVends.reduce(function(s,n){return s+(result[n]||0);},0);
  if(totalAtrib===0&&metaOutrosRows.length){
    var totalOutros=metaOutrosRows.filter(function(r){return parseDt(r['DATA ENVIO']||'')===maxOutros;})
      .reduce(function(s,r){return s+toNum(r['META FAT']||r['META FAT.']||'0');},0);
    var pv=cVends.length?totalOutros/cVends.length:0;
    cVends.forEach(function(n){if(!result[n])result[n]=pv;});
  }
  return result;
}

// ── RENDER ───────────────────────────────────────────────────────────────
function render(vendasRows,vendMap,metaPorVend){
  var hoje=todayISO();
  var buckets={};
  CHANNELS.forEach(function(ch){buckets[ch.id]={};});

  Object.keys(vendMap).forEach(function(nome){
    var canal=vendMap[nome].canal;
    if(buckets[canal]) buckets[canal][nome]={fatMTD:0,positMTD:0,positDia:0};
  });

  vendasRows.forEach(function(r){
    var nome=nn(r['NOME_VENDEDOR']||'');
    var info=vendMap[nome];
    var canal=info?info.canal:nn(r['CANAL']||'');
    if(!buckets[canal]) return;
    if(!buckets[canal][nome]) buckets[canal][nome]={fatMTD:0,positMTD:0,positDia:0};
    var fat=toNum(r['FATURAMENTO']);
    var posit=toNum(r['PEDIDOS'])||(fat>0?1:0);
    var isDia=String(r['DATA_FAT']||'').trim().startsWith(hoje);
    buckets[canal][nome].fatMTD+=fat;
    buckets[canal][nome].positMTD+=posit;
    if(isDia) buckets[canal][nome].positDia+=posit;
  });

  // Data da última venda
  var lastDt='';
  vendasRows.forEach(function(r){
    var dt=String(r['DT_EXECUCAO']||r['DATA_FAT']||'').trim();
    if(dt&&dt>lastDt) lastDt=dt;
  });
  if(lastDt){
    var el=document.getElementById('dataUltVenda');
    if(el){
      var p=lastDt.match(/^(\d{4})-(\d{2})-(\d{2})[T\s](\d{2}:\d{2})/);
      el.textContent=p?p[3]+'/'+p[2]+'/'+p[1]+' '+p[4]:lastDt;
    }
  }

  CHANNELS.forEach(function(ch){renderChannel(ch,buckets[ch.id],metaPorVend);});
  document.getElementById('app').style.display='';
}

function renderChannel(ch,vMap,metaPorVend){
  var chFat=0,chMeta=0,chPositMTD=0,chPositDia=0;
  var rows=[];
  Object.keys(vMap).forEach(function(nome){
    var d=vMap[nome];
    var meta=metaPorVend[nome]||0;
    chFat+=d.fatMTD; if(meta>0) chMeta+=meta;
    chPositMTD+=d.positMTD; chPositDia+=d.positDia;
    var pct=meta>0?d.fatMTD/meta*100:null;
    rows.push({nome:nome,fatMTD:d.fatMTD,meta:meta,positMTD:d.positMTD,positDia:d.positDia,pct:pct});
  });
  rows.sort(function(a,b){
    var aH=a.pct!==null,bH=b.pct!==null;
    if(aH&&bH) return b.pct-a.pct;
    if(aH) return -1; if(bH) return 1;
    return b.fatMTD-a.fatMTD;
  });
  var topN=CH_TOP[ch.id]||999;
  var displayRows=rows.slice(0,topN);
  var chPct=chMeta>0?chFat/chMeta*100:0;

  var hEl=document.getElementById('hpct_'+ch.id);
  if(hEl) hEl.textContent=fmtPct(chPct);

  gauge('g_'+ch.id,chPct,ch.color);

  var tbody=document.getElementById('tb_'+ch.id);
  tbody.innerHTML='';
  displayRows.forEach(function(r){
    var tr=document.createElement('tr');
    tr.innerHTML=
      '<td class="td-nome" title="'+r.nome+'">'+tc(r.nome)+'</td>'+
      '<td style="text-align:center"><span class="td-pct '+pctCls(r.pct)+'">'+fmtPct(r.pct)+'</span></td>'+
      '<td style="text-align:center">'+positBar(r.positMTD,100)+'</td>'+
      '<td style="text-align:center">'+positBar(r.positDia,8)+'</td>';
    tbody.appendChild(tr);
  });
  var tot=document.createElement('tr'); tot.className='tot-row';
  tot.innerHTML=
    '<td>Total</td>'+
    '<td style="text-align:center"><span class="td-pct '+pctCls(chPct)+'">'+fmtPct(chPct)+'</span></td>'+
    '<td style="text-align:center">'+chPositMTD+'</td>'+
    '<td style="text-align:center">'+chPositDia+'</td>';
  tbody.appendChild(tot);
}

// ── POSIT BAR ────────────────────────────────────────────────────────────
function positBar(val,maxVal){
  var pct=Math.min(val/maxVal*100,100);
  var c=pct>=85?'#2e7d32':pct>=50?'#f57f17':'#c62828';
  return '<div class="posit-bar-wrap">'+
    '<div class="posit-bar-bg"><div class="posit-bar-fill" style="width:'+pct.toFixed(1)+'%;background:'+c+'"></div></div>'+
    '<span class="posit-num">'+val+'</span>'+
    '</div>';
}

// ── GAUGE ────────────────────────────────────────────────────────────────
function gauge(id,pct,color){
  var c=document.getElementById(id); if(!c) return;
  var W=c.width,H=c.height,ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  var cx=W/2, cy=H-18, r=Math.min(W/2-28,H-36);

  // Track
  ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI,0,false);
  ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=18; ctx.lineCap='round'; ctx.stroke();

  // Tick at 50%
  var tx=cx+r*Math.cos(-Math.PI/2), ty=cy+r*Math.sin(-Math.PI/2);
  ctx.beginPath(); ctx.moveTo(tx,ty+10); ctx.lineTo(tx,ty-6);
  ctx.strokeStyle='#bbb'; ctx.lineWidth=2; ctx.lineCap='butt'; ctx.stroke();

  // Value
  var cap=Math.min(pct,105);
  if(cap>0){
    var ea=-Math.PI+Math.PI*(cap/100);
    ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI,ea,false);
    ctx.strokeStyle=color; ctx.lineWidth=18; ctx.lineCap='round'; ctx.stroke();
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────
function toNum(v){
  if(!v&&v!==0) return 0;
  var s=String(v).trim().replace(/[R$\s]/g,''); if(!s) return 0;
  var hasDot=s.indexOf('.')>=0,hasComma=s.indexOf(',')>=0;
  if(hasDot&&hasComma){
    if(s.lastIndexOf('.')>s.lastIndexOf(',')) s=s.replace(/,/g,'');
    else s=s.replace(/\./g,'').replace(',','.');
  } else if(hasComma&&!hasDot){ s=s.replace(',','.'); }
  return parseFloat(s)||0;
}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function fmtPct(n){if(n===null||n===undefined||!isFinite(n))return'—';return n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%';}
function pctCls(p){if(p===null||p===undefined)return'pct-none';return p>=85?'pct-g':p>=50?'pct-w':'pct-b';}
function tc(s){return s.toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});}
function setLoading(v,msg){document.getElementById('loading').style.display=v?'flex':'none';if(msg)document.getElementById('loadMsg').textContent=msg;}
function showErr(m){var e=document.getElementById('err-box');e.style.display='block';e.textContent=m;}
function clearErr(){document.getElementById('err-box').style.display='none';}
